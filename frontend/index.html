<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GIS AI WorkTable</title>

  <!-- ===== Leaflet CSS (国内 CDN — bootcdn) ===== -->
  <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/leaflet/1.9.4/leaflet.min.css" />

  <!-- ===== 自定义样式 ===== -->
  <link rel="stylesheet" href="css/style.css" />

  <!-- ===== 内联关键样式（防止 FOUC） ===== -->
  <style>
    /* 布局骨架闪白保护 */
    .app-layout { opacity: 0; transition: opacity 0.15s; }
    .app-layout.ready { opacity: 1; }
  </style>
</head>
<body>

  <!-- ========================================================= -->
  <!-- 应用布局                                                  -->
  <!-- ========================================================= -->
  <div class="app-layout" id="app">

    <!-- ==================== 主体 ==================== -->
    <div class="app-body">

      <!-- ======== 左侧聊天面板 ======== -->
      <aside class="chat-panel">
        <div class="chat-header">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 60" style="height:48px;width:auto;">
            <g transform="translate(10, 10)">
              <rect x="0" y="0" width="40" height="40" fill="none" stroke="#1A1A1A" stroke-width="2.5" rx="4"/>
              <line x1="20" y1="5" x2="20" y2="35" stroke="#1A1A1A" stroke-width="1.5" stroke-dasharray="2 2"/>
              <line x1="5" y1="20" x2="35" y2="20" stroke="#1A1A1A" stroke-width="1.5" stroke-dasharray="2 2"/>
              <circle cx="20" cy="20" r="4" fill="#1A1A1A"/>
            </g>
            <text x="60" y="32" font-family="Hanken Grotesk, sans-serif" font-weight="800" font-size="18" letter-spacing="0.1em" fill="#1A1A1A">GIS</text>
            <text x="60" y="48" font-family="Hanken Grotesk, sans-serif" font-weight="300" font-size="14" letter-spacing="0.3em" fill="#444444">WORKTABLE</text>
          </svg>
          <!-- header 右侧按钮组：版本标签 + AOI提取 + 齿轮(设置) + +(新建会话) -->
          <div style="margin-left:auto;display:flex;align-items:center;gap:4px;">
            <!-- 版本标签：显示 Git 提交号与后端启动时间，让用户知道当前运行的是哪个版本 -->
            <span id="versionBadge" title="后端版本信息" style="font-size:10px;padding:2px 6px;border-radius:3px;white-space:nowrap;cursor:default;">载入中...</span>
            <!-- 齿轮 ⚙ 按钮 → 打开设置弹窗，配置 DeepSeek API 密钥 -->
            <button id="settingsBtn" style="background:none;border:1px solid var(--ui-gray-200);border-radius:4px;padding:4px 6px;cursor:pointer;line-height:1;display:flex;align-items:center;" title="设置">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="var(--ui-gray-400)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="3"/>
                <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
              </svg>
            </button>
            <!-- + 按钮 → 清除当前会话的对话记忆，类似"新建会话" -->
            <button id="clearMemoryBtn" style="background:none;border:1px solid var(--ui-gray-200);border-radius:4px;padding:4px 6px;cursor:pointer;line-height:1;display:flex;align-items:center;" title="新建会话">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="var(--ui-gray-400)" stroke-width="2" stroke-linecap="round">
              <line x1="12" y1="5" x2="12" y2="19"/>
              <line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- 消息列表 -->
      <div class="chat-messages custom-scrollbar" id="chatMessages">
        <div class="chat-messages-empty">

        </div>
      </div>

        <!-- 输入区域 -->
        <div class="chat-input-area">
          <div class="chat-input-wrapper">
            <textarea
              class="chat-input"
              id="chatInput"
              placeholder="输入指令或查询..."
              rows="3"
            ></textarea>
          </div>
          <!-- 底部操作栏：模型选择 + 上传 + 发送 -->
          <div class="chat-input-model-bar">
            <div class="model-bar-left">
              <div class="model-select-wrapper" id="modelSelectTrigger">
                <svg class="model-status-dot" id="modelStatusDot" viewBox="0 0 8 8" width="8" height="8">
                  <circle cx="4" cy="4" r="4" fill="#d32f2f"/>
                </svg>
                <span id="modelSelectValue">DeepSeek V4 Flash</span>
                <svg class="model-select-arrow" viewBox="0 0 10 6" width="10" height="6">
                  <path d="M1 1l4 4 4-4" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                <!-- 隐藏的原生 select（保持 JS 兼容） -->
                <select id="modelSelector" title="选择AI模型" style="display:none;">
                  <option value="deepseek">DeepSeek V4 Flash</option>
                  <option value="glm">GLM-4.7-Flash</option>
                </select>
              </div>
              <!-- 模型选择器（向上弹出） -->
              <div class="model-picker" id="modelPicker">
              <div class="model-picker-option" data-value="deepseek">
                <div class="model-picker-info">
                  <span class="model-picker-name">DeepSeek V4 Flash</span>
                  <span class="model-picker-desc">GIS 处理与执行</span>
                </div>
                <svg class="model-picker-check" viewBox="0 0 16 16" width="16" height="16">
                  <circle cx="8" cy="8" r="7" fill="none" stroke="currentColor" stroke-width="1.5"/>
                  <path d="M5 8l2 2 4-4" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </div>
              <div class="model-picker-divider"></div>
              <div class="model-picker-option" data-value="glm">
                <div class="model-picker-info">
                  <span class="model-picker-name">GLM-4.7-Flash</span>
                  <span class="model-picker-desc">文本问答与规划</span>
                </div>
                <span class="model-picker-free">免费</span>
                <svg class="model-picker-check" viewBox="0 0 16 16" width="16" height="16">
                  <circle cx="8" cy="8" r="7" fill="none" stroke="currentColor" stroke-width="1.5"/>
                  <path d="M5 8l2 2 4-4" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </div>
            </div>  <!-- close model-picker -->
            </div>  <!-- close model-bar-left -->
            <div class="model-bar-right">
              <button class="icon-btn" id="uploadTrigger" title="上传文件">
                <svg class="svg-icon" style="color:var(--ui-gray-400)"><use href="assets/icons.svg#icon-attach"/></svg>
              </button>
              <button class="icon-btn" id="sendBtn" title="发送">
                <svg class="svg-icon" style="color:var(--ui-gray-900)"><use href="assets/icons.svg#icon-send"/></svg>
              </button>
            </div>
          </div>
          <div id="modelWarning" class="model-warning" style="display:none;margin:0 12px 6px;padding:4px 8px;font-size:11px;color:#b71c1c;background:#ffebee;border-radius:4px;text-align:center;">
            <span></span>
          </div>
        </div>
      </aside>

      <!-- ======== 中央主区域 ======== -->
      <main class="main-content">

        <!-- 地图区域 -->
        <div class="map-area map-grid" id="mapArea">
          <div class="map-placeholder">地图区域</div>
          <div id="map"></div>

          <!-- === 右上角：缩放控件 + 图层折叠按钮（嵌入底部） === -->
          <div class="map-zoom-controls">
            <button class="map-zoom-btn" id="zoomIn" title="放大">
              <svg><use href="assets/icons.svg#icon-zoom-in"/></svg>
            </button>
            <button class="map-zoom-btn" id="zoomOut" title="缩小">
              <svg><use href="assets/icons.svg#icon-zoom-out"/></svg>
            </button>
            <button class="map-zoom-btn" id="zoomLocate" title="定位">
              <svg><use href="assets/icons.svg#icon-locate"/></svg>
            </button>
            <button class="map-zoom-btn map-toggle-layer" id="toggleLayerPanel" title="切换图层面板">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                <line x1="3" y1="9" x2="21" y2="9"/>
                <line x1="9" y1="21" x2="9" y2="9"/>
              </svg>
            </button>
          </div>

          <!-- === 浮动图层面板（右上角） === -->
          <div class="map-layer-panel collapsed" id="mapLayerPanel">
            <div class="map-layer-header">
              <span class="map-layer-title">
                <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;margin-right:4px;">
                  <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                  <line x1="3" y1="9" x2="21" y2="9"/>
                  <line x1="9" y1="21" x2="9" y2="9"/>
                </svg>
                图层列表
              </span>
              <div class="map-layer-header-actions">
                <button class="map-layer-btn primary" id="uploadTriggerBtn" title="上传文件">
                  <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                  上传
                </button>
              </div>
            </div>
            <div class="map-layer-body custom-scrollbar" id="layersTableWrapper">
              <!-- 空状态 -->
              <div class="map-layer-empty" id="layersEmpty">
                <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
                <span>暂无图层</span>
                <span style="font-size:11px;opacity:0.5;">上传文件或让 AI 生成</span>
              </div>
              <!-- 图层列表 -->
              <table class="map-layer-table" id="layersTable" style="display:none;">
                <thead>
                  <tr>
                    <th></th>
                    <th></th>
                    <th>名称</th>
                    <th>类型</th>
                    <th></th>
                  </tr>
                </thead>
                <tbody id="layerTbody"></tbody>
              </table>
            </div>
          </div>

          <!-- 坐标显示 -->
          <div class="map-coords" id="mapCoords">
            --
          </div>

          <!-- Toast 通知（放在地图区域内，左上角弹出） -->
          <div class="toast-container" id="toastContainer"></div>

          <!-- 底部面板已移除 -->
        </div>

        <!-- 底部面板已移除（图层浮窗+下载已整合到图层行内） -->
      </main>
    </div><!-- /app-body -->
  </div><!-- /app-layout -->

  <!-- ========================================================= -->
  <!-- 隐藏的文件输入（用于上传）                                  -->
  <!-- ========================================================= -->
  <input
    type="file"
    id="fileInput"
    class="hidden-input"
    accept=".geojson,.json,.gpkg,.kml,.kmz,.gpx,.dxf,.zip,.csv"
    multiple
  />


  <!-- ========================================================= -->
  <!-- 设置弹窗                                                  -->
  <!-- 点击齿轮 ⚙ 按钮弹出，用来配置 DeepSeek API 密钥            -->
  <!-- ========================================================= -->
  <div class="modal-overlay" id="settingsModal" style="display:none;">
    <div class="modal">
      <!-- 弹窗头部：标题 + 关闭按钮 -->
      <div class="modal-header">
        <span class="modal-title">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
          设置
        </span>
        <button class="modal-close-btn" id="modalCloseBtn">✕</button>
      </div>
      <!-- 弹窗内容 -->
      <div class="modal-body">
        <!-- ===== DeepSeek 配置卡片 ===== -->
        <div class="model-config-card">
          <div class="model-config-header">
            <span class="model-config-name">DeepSeek V4 Flash</span>
            <span class="model-config-badge" id="apiKeyStatus">未配置</span>
          </div>
          <div class="modal-input-wrapper">
            <input type="password" class="modal-input" id="apiKeyInput" placeholder="sk-..." />
            <button class="modal-toggle-vis" id="toggleKeyVis" title="显示/隐藏密钥" style="display:flex;align-items:center;justify-content:center;">
              <svg id="eyeIcon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
          <div class="modal-test-result" id="testResult"></div>
          <div class="model-config-actions">
            <button class="modal-btn modal-btn-test" id="testKeyBtn">测速</button>
            <button class="modal-btn modal-btn-save" id="saveKeyBtn">保存</button>
          </div>
        </div>

        <!-- ===== GLM 配置卡片 ===== -->
        <div class="model-config-card">
          <div class="model-config-header">
            <span class="model-config-name">GLM-4.7-Flash</span>
            <span class="model-config-badge" id="glmApiKeyStatus">未配置</span>
            <span class="model-config-free">免费</span>
          </div>
          <div class="modal-input-wrapper">
            <input type="password" class="modal-input" id="glmApiKeyInput" placeholder="glm-..." />
            <button class="modal-toggle-vis" id="toggleGlmKeyVis" title="显示/隐藏密钥" style="display:flex;align-items:center;justify-content:center;">
              <svg id="glmEyeIcon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
          <div class="modal-test-result" id="glmTestResult"></div>
          <div class="model-config-actions">
            <button class="modal-btn modal-btn-test" id="testGlmKeyBtn">测速</button>
            <button class="modal-btn modal-btn-save" id="saveGlmKeyBtn">保存</button>
          </div>
        </div>

        <p class="modal-note">密钥仅保存在您的浏览器中，不会上传到服务器</p>
        <!-- 版本信息 -->
        <div class="modal-version-info">
          <span>提交: <span id="modalVersionCommit">-</span></span>
          <span>后端启动: <span id="modalVersionTime">-</span></span>
        </div>
      </div>
    </div>
  </div>
  <!-- ========================================================= -->

  <!-- Leaflet (bootcdn CDN — 国内可用) -->
  <script src="https://cdn.bootcdn.net/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <script src="https://cdn.bootcdn.net/ajax/libs/marked/15.0.6/marked.min.js"></script>

  <!-- 应用模块（按依赖顺序加载） -->
  <script src="js/api.js"></script>
  <script src="js/map.js"></script>
  <script src="js/chat.js"></script>
  <script src="js/layers.js"></script>
  <script src="js/upload.js"></script>
  <script src="js/aoi.js"></script>
  <script src="js/app.js"></script>
  <script src="js/time.js"></script>


  <!-- ===== 内联启动脚本（缩放控件绑定等） ===== -->
  <script>
    (function() {
      'use strict';

      // 显示布局
      document.getElementById('app').classList.add('ready');

      // ---- 地图缩放控件绑定 ----
      document.getElementById('zoomIn').addEventListener('click', function() {
        if (window.GIS && window.GIS.map) {
          var state = window.GIS.map.getState();
          if (state) window.GIS.map.setView(state.center, state.zoom + 1);
        }
      });

      document.getElementById('zoomOut').addEventListener('click', function() {
        if (window.GIS && window.GIS.map) {
          var state = window.GIS.map.getState();
          if (state) window.GIS.map.setView(state.center, state.zoom - 1);
        }
      });

      var locateMarker = null;
      document.getElementById('zoomLocate').addEventListener('click', function() {
        if (navigator.geolocation) {
          navigator.geolocation.getCurrentPosition(function(pos) {
            if (window.GIS && window.GIS.map) {
              var lat = pos.coords.latitude;
              var lng = pos.coords.longitude;
              window.GIS.map.setView([lat, lng], 15);

              // 移除旧的定位标记
              if (locateMarker) {
                window.GIS.map.getMap().removeLayer(locateMarker);
              }

              // 创建脉冲蓝点
              var icon = L.divIcon({
                className: '',
                html: '<div class="map-locate-dot"></div>',
                iconSize: [24, 24],
                iconAnchor: [12, 12],
              });
              locateMarker = L.marker([lat, lng], { icon: icon }).addTo(window.GIS.map.getMap());
            }
          }, function() {
            if (window.GIS && window.GIS.map) {
              window.GIS.map.setView([35, 110], 4);
            }
          });
        } else {
          if (window.GIS && window.GIS.map) {
            window.GIS.map.setView([35, 110], 4);
          }
        }
      });

      document.getElementById('clearMemoryBtn').addEventListener('click', async function() {
        try {
          await window.GIS.api.clearMemory();
          // 清掉聊天记录，但保留空状态提示元素
          var container = document.getElementById('chatMessages');
          container.innerHTML = '<div class="chat-messages-empty"></div>';
          // 清掉地图上的所有图层
          if (window.GIS.layers) {
            var allLayers = window.GIS.layers.getLayers();
            allLayers.forEach(function(l) {
              if (l.layer_id) window.GIS.layers.removeLayer(l.layer_id);
            });
          }
          // 处理结果面板已移除
          if (typeof updateGreeting === 'function') updateGreeting();
        } catch (e) {
          window.GIS.chat.addMessage('操作失败: ' + e.message, 'system');
        }
      });

      // ---- 设置弹窗逻辑 ----
      // 当用户点击齿轮 ⚙ 按钮时，弹出设置窗口，让用户配置 DeepSeek / GLM API 密钥
      var settingsModal = document.getElementById('settingsModal');
      var settingsBtn = document.getElementById('settingsBtn');
      var modalCloseBtn = document.getElementById('modalCloseBtn');
      var apiKeyInput = document.getElementById('apiKeyInput');
      var glmApiKeyInput = document.getElementById('glmApiKeyInput');
      var apiKeyStatus = document.getElementById('apiKeyStatus');
      var glmApiKeyStatus = document.getElementById('glmApiKeyStatus');
      var testResult = document.getElementById('testResult');
      var glmTestResult = document.getElementById('glmTestResult');
      var testKeyBtn = document.getElementById('testKeyBtn');
      var saveKeyBtn = document.getElementById('saveKeyBtn');
      var testGlmKeyBtn = document.getElementById('testGlmKeyBtn');
      var saveGlmKeyBtn = document.getElementById('saveGlmKeyBtn');
      var toggleKeyVis = document.getElementById('toggleKeyVis');
      var toggleGlmKeyVis = document.getElementById('toggleGlmKeyVis');

      // 打开弹窗：点击齿轮 ⚙ 触发
      settingsBtn.addEventListener('click', function() {
        // 加载 DeepSeek 密钥
        var savedKey = window.GIS.api.getApiKey();
        apiKeyInput.value = savedKey;
        updateKeyStatus(savedKey);
        testResult.innerHTML = '';
        // 加载 GLM 密钥
        var savedGlmKey = window.GIS.api.getGLMApiKey();
        glmApiKeyInput.value = savedGlmKey;
        updateGlmKeyStatus(savedGlmKey);
        glmTestResult.innerHTML = '';
        settingsModal.style.display = 'flex';  // 显示弹窗（flex 居中）
      });

      // 关闭弹窗：点击 ✕ 按钮、点击灰色遮罩、按 ESC 键 三种方式
      function closeModal() {
        settingsModal.style.display = 'none';
      }
      modalCloseBtn.addEventListener('click', closeModal);
      // 点击弹窗外部的灰色遮罩（overlay）时关闭
      settingsModal.addEventListener('click', function(e) {
        if (e.target === settingsModal) closeModal();
      });
      // 按 ESC 键时关闭
      document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape' && settingsModal.style.display === 'flex') closeModal();
      });

      // 显示/隐藏密钥：点击眼睛图标切换 input 的 type（password ↔ text）
      toggleKeyVis.addEventListener('click', function() {
        var eyeIcon = document.getElementById('eyeIcon');
        if (apiKeyInput.type === 'password') {
          apiKeyInput.type = 'text';
          eyeIcon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/><path d="M14.12 14.12a3 3 0 1 1-4.24-4.24"/>';
        } else {
          apiKeyInput.type = 'password';
          eyeIcon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
        }
      });

      // GLM 密钥显隐切换
      toggleGlmKeyVis.addEventListener('click', function() {
        var eyeIcon = document.getElementById('glmEyeIcon');
        if (glmApiKeyInput.type === 'password') {
          glmApiKeyInput.type = 'text';
          eyeIcon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/><path d="M14.12 14.12a3 3 0 1 1-4.24-4.24"/>';
        } else {
          glmApiKeyInput.type = 'password';
          eyeIcon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
        }
      });

      // 更新配置状态显示：badge 绿色/灰色
      function updateKeyStatus(key) {
        apiKeyStatus.textContent = key ? '已配置' : '未配置';
        apiKeyStatus.className = 'model-config-badge' + (key ? ' configured' : '');
      }
      function updateGlmKeyStatus(key) {
        glmApiKeyStatus.textContent = key ? '已配置' : '未配置';
        glmApiKeyStatus.className = 'model-config-badge' + (key ? ' configured' : '');
      }

	      // ---- 测速按钮 ----
	      // 向后端发请求验证密钥能否连上 DeepSeek
	      var isTesting = false;  // 防止重复点击
	      testKeyBtn.addEventListener('click', async function() {
	        var key = apiKeyInput.value.trim();
	        if (!key) {
	          testResult.textContent = '请先输入 API 密钥';
	          testResult.className = 'modal-test-result modal-test-error';
	          return;
	        }
	        if (isTesting) return;
	        isTesting = true;
	        testKeyBtn.textContent = '测速中...';
	        testKeyBtn.disabled = true;
	        testResult.innerHTML = '<span class="loading-spinner"></span> 正在连接...';
	        testResult.className = 'modal-test-result';

	        try {
	          // 调后端 /api/test-key 接口，后端会发一条极简请求到 DeepSeek 验证
	          var res = await window.GIS.api.testApiKey(key);
	          testResult.textContent = res.message;  // "连接成功 ✓" 或 "密钥无效"
	          testResult.className = 'modal-test-result ' + (res.success ? 'modal-test-success' : 'modal-test-error');
	          // 更新模型状态圆点
	          window.GIS.api.setModelStatus('deepseek', res.success ? 'online' : 'offline');
	          if (modelSelector && modelSelector.value === 'deepseek') updateModelStatusDot();
	        } catch (e) {
	          testResult.textContent = '连接失败: ' + e.message;
	          testResult.className = 'modal-test-result modal-test-error';
	          window.GIS.api.setModelStatus('deepseek', 'offline');
	          if (modelSelector && modelSelector.value === 'deepseek') updateModelStatusDot();
	        } finally {
	          isTesting = false;
	          testKeyBtn.textContent = '测速';
	          testKeyBtn.disabled = false;
	        }
	      });

      // ---- 保存按钮 ----
      // 把密钥存到浏览器 localStorage，关闭浏览器再打开还在
      saveKeyBtn.addEventListener('click', function() {
        var key = apiKeyInput.value.trim();
        window.GIS.api.setApiKey(key);  // 存到 localStorage
        updateKeyStatus(key);
        // 按钮文字闪一下"已保存 ✓"再变回来，给用户反馈
        var orig = saveKeyBtn.textContent;
        saveKeyBtn.textContent = '已保存 ✓';
        setTimeout(function() { saveKeyBtn.textContent = orig; }, 2000);
        if (window.GIS && window.GIS.app && window.GIS.app.toast) {
          window.GIS.app.toast('API 密钥已保存', 'success');
        }
      });

      // ---- GLM 测速按钮 ----
      var isTestingGlm = false;
      testGlmKeyBtn.addEventListener('click', async function() {
        var key = glmApiKeyInput.value.trim();
        if (!key) {
          glmTestResult.textContent = '请先输入 API 密钥';
          glmTestResult.className = 'modal-test-result modal-test-error';
          return;
        }
        if (isTestingGlm) return;
        isTestingGlm = true;
        testGlmKeyBtn.textContent = '测速中...';
        testGlmKeyBtn.disabled = true;
        glmTestResult.innerHTML = '<span class="loading-spinner"></span> 正在连接...';
        glmTestResult.className = 'modal-test-result';

        try {
          var res = await window.GIS.api.testGLMApiKey(key);
          glmTestResult.textContent = res.message;
          glmTestResult.className = 'modal-test-result ' + (res.success ? 'modal-test-success' : 'modal-test-error');
          // 更新模型状态圆点
          window.GIS.api.setModelStatus('glm', res.success ? 'online' : 'offline');
          if (modelSelector && modelSelector.value === 'glm') updateModelStatusDot();
        } catch (e) {
          window.GIS.api.setModelStatus('glm', 'offline');
          if (modelSelector && modelSelector.value === 'glm') updateModelStatusDot();
          glmTestResult.textContent = '连接失败: ' + e.message;
          glmTestResult.className = 'modal-test-result modal-test-error';
        } finally {
          isTestingGlm = false;
          testGlmKeyBtn.textContent = '测速';
          testGlmKeyBtn.disabled = false;
        }
      });

      // ---- GLM 保存按钮 ----
      saveGlmKeyBtn.addEventListener('click', function() {
        var key = glmApiKeyInput.value.trim();
        window.GIS.api.setGLMApiKey(key);
        updateGlmKeyStatus(key);
        var orig = saveGlmKeyBtn.textContent;
        saveGlmKeyBtn.textContent = '已保存 ✓';
        setTimeout(function() { saveGlmKeyBtn.textContent = orig; }, 2000);
        if (window.GIS && window.GIS.app && window.GIS.app.toast) {
          window.GIS.app.toast('GLM API 密钥已保存', 'success');
        }
      });

      // ---- 模型选择器持久化 + 状态圆点 ----
      var modelSelector = document.getElementById('modelSelector');
      var modelStatusDot = document.getElementById('modelStatusDot');

      /** 根据当前选中的模型更新状态圆点 */
      function updateModelStatusDot() {
        if (!modelSelector || !modelStatusDot) return;
        var provider = modelSelector.value;
        var status = window.GIS.api.getModelStatus(provider);
        // 移除所有状态类
        modelStatusDot.classList.remove('online', 'offline', 'checking');
        if (status === 'online') {
          modelStatusDot.classList.add('online');
        } else if (status === 'offline') {
          modelStatusDot.classList.add('offline');
        } else {
          // 'untested' — 默认显示红色（未通过）
          modelStatusDot.classList.add('offline');
        }
        // 同时更新双模型警告
        updateModelWarning();
      }

      /** 检查两个模型是否都未配置，显示警告 */
      function updateModelWarning() {
        var warn = document.getElementById('modelWarning');
        if (!warn) return;
        var dsKey = window.GIS.api.getApiKey();
        var glmKey = window.GIS.api.getGLMApiKey();
        var dsStatus = window.GIS.api.getModelStatus('deepseek');
        var glmStatus = window.GIS.api.getModelStatus('glm');
        // 两个都未配置或都离线时显示警告
        var bothOffline = (!dsKey && !glmKey) || (dsStatus === 'offline' && glmStatus === 'offline');
        if (bothOffline) {
          warn.style.display = 'block';
          var msg = '';
          if (!dsKey && !glmKey) msg = 'DeepSeek 和 GLM 均未配置 API Key，请点击齿轮按钮设置';
          else msg = 'DeepSeek 和 GLM 均连接失败，请检查 API Key 配置';
          warn.querySelector('span').textContent = msg;
        } else {
          warn.style.display = 'none';
        }
      }

      // ---- 模型选择器（向上弹出） ----
      var modelPicker = document.getElementById('modelPicker');
      var modelPickerOptions = modelPicker.querySelectorAll('.model-picker-option');
      var modelSelectTrigger = document.getElementById('modelSelectTrigger');
      var modelSelectValue = document.getElementById('modelSelectValue');

      function updatePickerSelection() {
        var cur = modelSelector.value;
        modelPickerOptions.forEach(function(opt) {
          opt.classList.toggle('is-selected', opt.dataset.value === cur);
        });
      }

      function selectModel(value) {
        if (value === modelSelector.value) { modelPicker.classList.remove('is-open'); return; }
        modelSelector.value = value;
        modelSelectValue.textContent = value === 'deepseek' ? 'DeepSeek V4 Flash' : 'GLM-4.7-Flash';
        window.GIS.api.setSelectedModel(value);
        updateModelStatusDot();
        modelPicker.classList.remove('is-open');
      }

      // 点击触发器切换
      modelSelectTrigger.addEventListener('click', function(e) {
        updatePickerSelection();
        modelPicker.classList.toggle('is-open');
      });

      // 点击选项选择模型
      modelPickerOptions.forEach(function(opt) {
        opt.addEventListener('click', function() {
          selectModel(this.dataset.value);
        });
      });

      // 点击外部关闭
      document.addEventListener('click', function(e) {
        if (modelPicker.classList.contains('is-open') &&
            !modelPicker.contains(e.target) &&
            !modelSelectTrigger.contains(e.target)) {
          modelPicker.classList.remove('is-open');
        }
      });

      // 初始化
      if (modelSelector) {
        var savedModel = window.GIS.api.getSelectedModel();
        modelSelector.value = savedModel;
        modelSelectValue.textContent = savedModel === 'deepseek' ? 'DeepSeek V4 Flash' : 'GLM-4.7-Flash';
        modelPickerOptions.forEach(function(opt) {
          opt.classList.toggle('is-selected', opt.dataset.value === savedModel);
        });
        updateModelStatusDot();
      }

      // ---- 按钮按下反馈（微交互） ----
      document.querySelectorAll('button, .icon-btn, .map-zoom-btn, .map-layer-btn, .layer-action-btn')
        .forEach(function(el) {
          el.addEventListener('mousedown', function() { this.style.opacity = '0.7'; });
          el.addEventListener('mouseup', function() { this.style.opacity = '1'; });
          el.addEventListener('mouseleave', function() { this.style.opacity = '1'; });
        });

      // ---- 加载版本信息 ----
      (function loadVersion() {
        var badge = document.getElementById('versionBadge');
        if (!badge) return;
        if (window.GIS && window.GIS.api && window.GIS.api.getVersion) {
          window.GIS.api.getVersion().then(function(ver) {
            if (ver && ver.commit) {
              var dirty = ver.dirty ? '*' : '';
              badge.textContent = ver.commit + dirty + ' | ' + (ver.start_time || '');
              badge.style.cssText = 'font-size:10px;padding:2px 6px;border-radius:3px;white-space:nowrap;cursor:default;background:var(--ui-gray-100);color:var(--ui-gray-400);';
              badge.title = '提交: ' + ver.commit + (ver.dirty ? ' (有未提交的改动)' : '') + ' | 后端启动: ' + (ver.start_time || '未知');
              // 同步更新设置弹窗里的版本信息
              var mc = document.getElementById('modalVersionCommit');
              var mt = document.getElementById('modalVersionTime');
              if (mc) mc.textContent = ver.commit + (ver.dirty ? '*' : '');
              if (mt) mt.textContent = ver.start_time || '未知';
            } else {
              badge.textContent = '无法连接';
              badge.style.cssText = 'font-size:10px;padding:2px 6px;border-radius:3px;white-space:nowrap;cursor:default;background:#ffebee;color:#c62828;';
              badge.title = '后端未响应，请确认服务已启动';
            }
          }).catch(function() {
            badge.textContent = '无法连接';
            badge.style.cssText = 'font-size:10px;padding:2px 6px;border-radius:3px;white-space:nowrap;cursor:default;background:#ffebee;color:#c62828;';
            badge.title = '后端未响应，请确认服务已启动';
          });
        } else {
          setTimeout(loadVersion, 1000);
        }
      })();

      // ---- 自动检测模型状态（页面加载后检测已保存密钥的模型） ----
      (function autoDetectModelStatus() {
        if (!window.GIS || !window.GIS.api) {
          setTimeout(autoDetectModelStatus, 1000);
          return;
        }
        var providers = ['deepseek', 'glm'];
        providers.forEach(function(provider) {
          var key = provider === 'glm' ? window.GIS.api.getGLMApiKey() : window.GIS.api.getApiKey();
          if (!key) {
            // 没有密钥，标记为 offline
            window.GIS.api.setModelStatus(provider, 'offline');
            // 如果是当前选中的模型，更新圆点
            if (modelSelector && modelSelector.value === provider) {
              updateModelStatusDot();
            }
            return;
          }

          // 有密钥，显示检测中
          if (modelSelector && modelSelector.value === provider && modelStatusDot) {
            modelStatusDot.classList.remove('online', 'offline');
            modelStatusDot.classList.add('checking');
          }

          // 发测速请求
          var testFn = provider === 'glm' ? window.GIS.api.testGLMApiKey : window.GIS.api.testApiKey;
          testFn(key).then(function(result) {
            window.GIS.api.setModelStatus(provider, result.success ? 'online' : 'offline');
            if (modelSelector && modelSelector.value === provider) {
              updateModelStatusDot();
            }
          }).catch(function() {
            window.GIS.api.setModelStatus(provider, 'offline');
            if (modelSelector && modelSelector.value === provider) {
              updateModelStatusDot();
            }
          });
        });
      })();

      console.log('[GIS] 内联启动脚本完成');
    })();
  </script>

</body>
</html>
